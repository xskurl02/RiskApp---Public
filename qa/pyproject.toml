[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "--color=yes"

[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = '''
(
  /\.venv
  | /\.git
  | /__pycache__
  | .*ui_.*\.py$
)
'''

[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = [".venv", ".git", "__pycache__", "**/ui_*.py"]

[tool.ruff.lint]
select = [
  "E", "F", "I", "B", "UP", "SIM",
]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"qa/tests/**/*.py" = [
  "S101",
]

"server/riskapp_server/api/routers/**/*.py" = ["B008"]
"server/riskapp_server/auth/service.py" = ["B008"]
